# Builds the CCD client and server Docker images and pushes them to ACR.
# Triggered by the `save-the-children` git tag.
#
# Targets the Windows self-hosted `MENA-HotPot Pipelines` agent pool —
# script blocks use PowerShell.
#
# Required Azure DevOps configuration:
#   * Variable group `ccd-save-the-children` (or rename below) holding the
#     client build-time variables: API_URL, DIRECTUS_URL, DIRECTUS_TOKEN,
#     AUTH_PROVIDER, B2C_TENANT, B2C_CLIENT_ID, B2C_USER_FLOW, B2C_REDIRECT_URI.
#     Mark DIRECTUS_TOKEN as a secret.
#   * Docker Registry service connection — `azureSubscription` below.
#     Set its value to the name of the connection that points at ACR.
#   * Agent must have Docker installed and the agent user must be in the
#     docker-users group.

trigger:
  branches:
    exclude:
      - '*'
  tags:
    include:
      - save-the-children

pr: none

pool: 'MENA-HotPot Pipelines'

variables:
  - group: ccd-save-the-children
  - name: imageTag
    value: save-the-children
  - name: azureSubscription
    value: 'unicrmenarohotpotcommon'
  - name: imageRepository
    value: init/ccd-data-portal/image

stages:
  - stage: Build
    displayName: Build images
    jobs:
      - job: Client
        displayName: Build client image
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
            displayName: Use Node 18

          - task: PowerShell@2
            displayName: Build client bundle
            inputs:
              targetType: inline
              pwsh: false
              script: |
                $ErrorActionPreference = 'Stop'
                npm install -g yarn
                Set-Location client
                yarn install --frozen-lockfile
                @"
                VITE_API_URL=$env:API_URL
                VITE_DIRECTUS_URL=$env:DIRECTUS_URL
                VITE_DIRECTUS_TOKEN=$env:DIRECTUS_TOKEN
                VITE_AUTH_PROVIDER=$env:AUTH_PROVIDER
                VITE_B2C_TENANT=$env:B2C_TENANT
                VITE_B2C_CLIENT_ID=$env:B2C_CLIENT_ID
                VITE_B2C_USER_FLOW=$env:B2C_USER_FLOW
                VITE_B2C_REDIRECT_URI=$env:B2C_REDIRECT_URI
                "@ | Out-File -FilePath .env -Encoding ascii
                yarn build
                Move-Item dist ../client-build
                Copy-Item deployment/Dockerfile ../client-build/
                Copy-Item deployment/nginx.conf ../client-build/
            env:
              API_URL: $(API_URL)
              DIRECTUS_URL: $(DIRECTUS_URL)
              DIRECTUS_TOKEN: $(DIRECTUS_TOKEN)
              AUTH_PROVIDER: $(AUTH_PROVIDER)
              B2C_TENANT: $(B2C_TENANT)
              B2C_CLIENT_ID: $(B2C_CLIENT_ID)
              B2C_USER_FLOW: $(B2C_USER_FLOW)
              B2C_REDIRECT_URI: $(B2C_REDIRECT_URI)

          - task: Docker@2
            displayName: Build & push client image
            inputs:
              containerRegistry: $(azureSubscription)
              repository: $(imageRepository)
              command: buildAndPush
              Dockerfile: client-build/Dockerfile
              buildContext: client-build
              tags: |
                client-$(imageTag)

      - job: Server
        displayName: Build server image
        steps:
          - task: UseDotNet@2
            inputs:
              version: '8.0.x'
            displayName: Use .NET 8 SDK

          - task: NodeTool@0
            inputs:
              versionSpec: '18.x'
            displayName: Use Node 18

          - task: PowerShell@2
            displayName: Build server bundle
            inputs:
              targetType: inline
              pwsh: false
              script: |
                $ErrorActionPreference = 'Stop'
                Set-Location server
                npm install
                npm run build
                Move-Item Ccd.Server/build ../server-build
                Copy-Item deployment/Dockerfile ../server-build/

          - task: Docker@2
            displayName: Build & push server image
            inputs:
              containerRegistry: $(azureSubscription)
              repository: $(imageRepository)
              command: buildAndPush
              Dockerfile: server-build/Dockerfile
              buildContext: server-build
              tags: |
                server-$(imageTag)
